[custom.home-dirty]
description = "Check if home directory is dirty."
format = '[($output)]($style)[в”Җ](dimmed white)'
when = true
command = """
ret=""
for i in $(command ls -A $HOME); do
    case $i in
        .bash_logout);;
        .bash_profile);;
        .bashrc);;
        .cache);;
        .conda);;
        .config);;
        .local);;
        .pcsc10);;
        .profile);;
        .sos);;
        .ssh);;
        .sudo_as_admin_successful);;
        .xsessionrc);;
        .zshenv);;
        My);;
        *)
            ret+=" $i";;
    esac
done
if [ -n "$ret" ]; then
    echo "у°Ў» $ret"
fi
unset ret
"""
shell = ["bash", "--noprofile", "--norc"]

